<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiz Familiar</title>

  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; }

<script>

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// DOM
const imgInput = document.getElementById('img-input');
const canvas = document.getElementById('main-canvas');
const memberList = document.getElementById('member-list');

const canvasInner = document.getElementById('canvas-inner');
const memberSection = document.getElementById('member-section');
const editorToggleBtn = document.getElementById('editor-toggle');
const editorContent = document.getElementById('editor-content');
const zoomInBtn = document.getElementById('zoom-in-btn');
const zoomOutBtn = document.getElementById('zoom-out-btn');
const zoomFitBtn = document.getElementById('zoom-fit-btn');
const zoomLabelEl = document.getElementById('zoom-label');
const addMemberBtn = document.getElementById('add-member-btn');
const childrenChips = document.getElementById('edit-children-chips');

// --- SESSION SAVE/LOAD ---
// Minimal, targeted change: replace old TXT export/import with compressed+encrypted .ses export/import.
// Only this block was changed from the original file. Everything else remains as in the original repo.

/* Helper: base64 <-> ArrayBuffer */
function arrayBufferToBase64(ab) {
  const bytes = new Uint8Array(ab);
  let binary = '';
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}
function base64ToArrayBuffer(b64) {
  const binary = atob(b64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

/* Key derivation using PBKDF2 -> AES-GCM */
async function deriveKeyFromPassword(password, salt, iterations = 200000) {
  const enc = new TextEncoder();
  const pwUtf8 = enc.encode(password);
  const baseKey = await crypto.subtle.importKey('raw', pwUtf8, 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: iterations, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encryptCompressedBytes(password, compressedBytes) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const iterations = 200000;
  const key = await deriveKeyFromPassword(password, salt, iterations);
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, compressedBytes);
  return {
    version: 1,
    algo: 'AES-GCM',
    compression: 'deflate',
    iterations: iterations,
    salt: arrayBufferToBase64(salt.buffer),
    iv: arrayBufferToBase64(iv.buffer),
    ct: arrayBufferToBase64(ct)
  };
}

async function decryptCompressedBytes(password, envelope) {
  const salt = base64ToArrayBuffer(envelope.salt);
  const iv = base64ToArrayBuffer(envelope.iv);
  const ct = base64ToArrayBuffer(envelope.ct);
  const iterations = envelope.iterations || 200000;
  const key = await deriveKeyFromPassword(password, new Uint8Array(salt), iterations);
  try {
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, key, ct);
    return new Uint8Array(plain);
  } catch(e) {
    throw new Error('Decryption failed');
  }
}

/* Try to decode old-format session (legacy) */
function tryDecodeOldFormat(text) {
  // Old format in this project used: encodeURIComponent(btoa(unescape(encodeURIComponent(data))))
  // We'll try a few fallbacks to be robust.
  // 1) If text looks percent-encoded base64, try decodeURIComponent -> atob
  try {
    // If decodeURIComponent succeeds and results in a base64 string
    const maybeB64 = decodeURIComponent(text.trim());
    try {
      const bytes = Uint8Array.from(atob(maybeB64), c => c.charCodeAt(0));
      // decode bytes as UTF-8
      const str = new TextDecoder().decode(bytes);
      return JSON.parse(str);
    } catch (err) {
      // not base64 after decodeURIComponent, fall through
    }
  } catch (e) {
    // decodeURIComponent thrown: ignore
  }

  // 2) Maybe it's straight base64 of binary utf8: atob(text) -> utf8
  try {
    const bytes = Uint8Array.from(atob(text.trim()), c => c.charCodeAt(0));
    const str = new TextDecoder().decode(bytes);
    return JSON.parse(str);
  } catch (e) {
    // not base64
  }

  // 3) Maybe it's raw JSON
  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error('Unknown legacy format');
  }
}

/* Save session: compress -> encrypt -> download */
async function saveSessionToTxt() {
  try {
    const password = prompt('Elija una contraseña para cifrar la sesión (no la pierda):');
    if (!password) { alert('Se necesita contraseña para cifrar.'); return; }

    const payload = {
      meta: { savedAt: new Date().toISOString(), version: 1 },
      image: state.image,
      imgWidth: state.imgWidth,
      imgHeight: state.imgHeight,
      members: state.members
    };

    const json = JSON.stringify(payload);
    const utf8 = new TextEncoder().encode(json);

    // compress using pako (deflate)
    const compressed = pako.deflate(utf8);

    // encrypt compressed bytes
    const envelope = await encryptCompressedBytes(password, compressed);

    // stringify envelope and download
    const blob = new Blob([JSON.stringify(envelope)], { type: 'application/octet-stream' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'quiz-familiar-session.ses';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 100);
  } catch (err) {
    console.error(err);
    alert('Error al guardar sesión cifrada: ' + err.message);
  }
}
sessionSaveBtn.onclick = saveSessionToTxt;
sessionFileLabel.onclick = function() { sessionFileBtn.click(); };
sessionFileBtn.onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev=> {
    try {
      const text = ev.target.result.trim();

      // Try parse as new envelope
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch (e) {
        parsed = null;
      }

      if (parsed && parsed.ct && parsed.salt && parsed.iv) {
        // new encrypted format
        const password = prompt('Introduzca la contraseña para descifrar la sesión:');
        if (!password) { sessionLoadError.textContent = 'Contraseña necesaria.'; return; }
        try {
          const compressed = await decryptCompressedBytes(password, parsed);
          const decompressed = pako.inflate(compressed);
          const json = new TextDecoder().decode(decompressed);
          const data = JSON.parse(json);
          Object.assign(state, {
            image: data.image || null,
            imgWidth: data.imgWidth || 0,
            imgHeight: data.imgHeight || 0,
            members: Array.isArray(data.members) ? data.members : []
          });
          if (state.image) loadImage(state.image); else drawCanvas();
          renderMemberList();
          showEditPane(null);
          sessionLoadError.textContent = '';
        } catch (err) {
          console.error(err);
          sessionLoadError.textContent = 'No se pudo descifrar la sesión. Contraseña inválida o archivo corrupto.';
        }
      } else {
        // Not an envelope: try to decode legacy format (non-encrypted)
        try {
          const legacy = tryDecodeOldFormat(text);
          // We have legacy JSON payload; prompt whether to convert+encrypt immediately in-browser
          const doConvert = confirm('Archivo de sesión antiguo detectado (sin cifrar). ¿Desea cifrarlo ahora en un nuevo archivo protegido con contraseña? (Aceptar = cifrar y descargar, Cancelar = cargar en memoria sin cifrar)');
          if (doConvert) {
            const password = prompt('Elija una contraseña para cifrar la sesión (no la pierda):');
            if (!password) { sessionLoadError.textContent = 'Contraseña necesaria para cifrar.'; return; }
            const json = JSON.stringify(legacy);
            const utf8 = new TextEncoder().encode(json);
            const compressed = pako.deflate(utf8);
            const envelope = await encryptCompressedBytes(password, compressed);
            const blob = new Blob([JSON.stringify(envelope)], { type: 'application/octet-stream' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'quiz-familiar-session.ses';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 100);
            // still load decrypted into current state
            Object.assign(state, {
              image: legacy.image || null,
              imgWidth: legacy.imgWidth || 0,
              imgHeight: legacy.imgHeight || 0,
              members: Array.isArray(legacy.members) ? legacy.members : []
            });
            if (state.image) loadImage(state.image); else drawCanvas();
            renderMemberList();
            showEditPane(null);
            sessionLoadError.textContent = '';
          } else {
            // load legacy into session without encrypting
            Object.assign(state, {
              image: legacy.image || null,
              imgWidth: legacy.imgWidth || 0,
              imgHeight: legacy.imgHeight || 0,
              members: Array.isArray(legacy.members) ? legacy.members : []
            });
            if (state.image) loadImage(state.image); else drawCanvas();
            renderMemberList();
            showEditPane(null);
            sessionLoadError.textContent = '';
          }
        } catch (err) {
          console.error(err);
          sessionLoadError.textContent = 'Archivo de sesión no válido o desconocido.';
        }
      }
    } catch(e) {
      console.error(e);
      sessionLoadError.textContent = 'Archivo de sesión no válido.';
    }
  };
  reader.readAsText(file);

function renderQuizQ() {
  if (!quiz) return;
  quizContent.innerHTML = '';
  // Update progress
  const pct = (quiz.i / quiz.questions.length) * 100;
  quizProgressFill.style.width = pct + '%';
  quizProgressText.textContent = `Pregunta ${Math.min(quiz.i+1, quiz.questions.length)} de ${quiz.questions.length}`;

  if (quiz.i >= quiz.questions.length) {
    quizEndTime = Date.now();
    quizProgressFill.style.width = '100%';
    quizProgressText.textContent = '¡Completado!';
    document.querySelector('.quiz-exit-wrap').style.display = 'none';
    let ms = quizEndTime - quizStartTime;
    let sec = Math.round(ms/1000);
    let min = Math.floor(sec/60);
    sec = sec%60;
    let timeStr = min > 0 ? `${min} min ${sec} s` : `${sec} s`;
    // Star score: accuracy + speed, ms-precision (0-1000)
    const accuracy = quiz.score / quiz.questions.length;
    const baseline = 500 * quiz.questions.length; // ideal total time
    const totalTime = quiz.answers.reduce((s,a)=>s+a.time, 0);
    const overtime = Math.max(0, totalTime - baseline);
    // Speed degrades: every extra ms beyond baseline costs points, fully gone at 10s/question extra
    const maxOvertime = 10000 * quiz.questions.length;
    const speedFactor = Math.max(0, 1 - overtime / maxOvertime);
    const rawScore = accuracy * 700 + speedFactor * accuracy * 300;
    // Add ms fraction to break ties: use total ms modulo to add 0.000-0.999
    const tieBreaker = 1 - (totalTime % 1000) / 1000;
    const starScore = Math.min(1000, Math.round(rawScore * 10) / 10 + Math.round(tieBreaker * 10) / 100);
    const starCount = starScore >= 900 ? 5 : starScore >= 700 ? 4 : starScore >= 500 ? 3 : starScore >= 300 ? 2 : starScore >= 100 ? 1 : 0;
    const stars = '★'.repeat(starCount) + '☆'.repeat(5 - starCount);
    quizContent.innerHTML = `<div class="quiz-results">
      <h2>¡Quiz Completado!</h2>
      <div class="quiz-score ${accuracy>.7?'score-good':'score-bad'}">${quiz.score} / ${quiz.questions.length}</div>
      <div class="quiz-stars">${stars}</div>
      <div class="quiz-star-score">${starScore} / 1000 puntos</div>
      <div class="quiz-time">⏱ ${timeStr}</div>
      <ul class="quiz-answers-list">${
        quiz.answers.map((a,i)=>{
          let t = a.time < 1000 ? `${a.time}ms` : `${(a.time/1000).toFixed(1)}s`;
          return `<li class="${a.correct?'correct':'wrong'}">Pregunta ${i+1} (${t}): ${a.correct?'✅':'❌'} ${escapeHtml(a.desc)}</li>`;
        }).join('')
      }</ul>
      <button class="button button--primary" style="margin-top:1rem;" onclick="hideQuiz()">Cerrar</button>
    </div>`;
    // Confetti: exponential intensity based on score
    const pct = quiz.score / quiz.questions.length;
    if (pct >= 0.5) {
      // Exponential: 50%->tiny, 90%->moderate, 100%->massive
      const t = (pct - 0.5) / 0.5; // 0..1
      const intensity = Math.pow(t, 3); // exponential curve
      launchConfetti(intensity);
    }
    return;
  }
  const q = quiz.questions[quiz.i];
  document.querySelector('.quiz-exit-wrap').style.display = '';
  quiz.qStart = Date.now();
  if (q.type==='who-photo') {
    const m = state.members.find(x=>x.id===q.member);
    let photo = cropImgToDataUrl(state.image, ...m.rect);
    let opts = shuffle(state.members.filter(x=>x.name && x.name!==m.name).map(x=>x.name));
    opts = [...new Set(opts)].slice(0,3);
    opts.push(m.name);
    opts = shuffle(opts);
    quizContent.innerHTML = `
      <div class="quiz-question">¿Quién aparece en la foto?</div>
      <div class="quiz-photo-wrap"><img src="${photo}" class="quiz-img-big"></div>
      <div class="quiz-options">${
        opts.map(n=>`<button class="quiz-opt-btn" onclick="answerQuiz('${escapeHtml(n.replace(/'/g,"\\'"))}', null, this)">${escapeHtml(n)}</button>`).join('')
      }</div>
    `;
  } else if (q.type==='how-many-children') {
    const m = state.members.find(x=>x.id===q.member);
    const count = m.children.length;
    let optSet = new Set([count, count+1, Math.max(0,count-1), count+2]);
    let i = count+3;
    while (optSet.size < 4) optSet.add(i++);
    let opts = shuffle([...optSet]).slice(0,4);
    quizContent.innerHTML = `
      <div class="quiz-question">¿Cuántos hijos tiene <b>${escapeHtml(m.name)}</b>?</div>
      <div class="quiz-options">${
        opts.map(n=>`<button class="quiz-opt-btn" onclick="answerQuiz(${n}, null, this)">${n}</button>`).join('')
      }</div>
    `;
  } else if (q.type==='who-spouse') {
    const m = state.members.find(x=>x.id===q.member);
    const spouse = state.members.find(x=>x.id===m.spouse);
    let opts = shuffle(state.members.filter(x=>x.id!==m.id && x.name && x.name!==spouse.name).map(x=>x.name));
    opts = [...new Set(opts)].slice(0,3);
    opts.push(spouse.name);
    opts = shuffle(opts);
    quizContent.innerHTML = `
      <div class="quiz-question">¿Quién es la pareja de <b>${escapeHtml(m.name)}</b>?</div>
      <div class="quiz-options">${
        opts.map(n=>`<button class="quiz-opt-btn" onclick="answerQuiz('${escapeHtml(n.replace(/'/g,"\\'"))}', null, this)">${escapeHtml(n)}</button>`).join('')
      }</div>
    `;
  } else if (q.type==='who-parent') {
    const child = state.members.find(x=>x.id===q.child);
    const parentIds = state.members.filter(x=>x.children && x.children.includes(child.id)).map(x=>x.id);
    const parentNames = parentIds.map(pid=>state.members.find(x=>x.id===pid).name);
    // Use only other parents as distractors (not childless members)
    const allParents = state.members.filter(x=>x.children && x.children.length>0 && x.name && x.id!==child.id);
    let opts = shuffle(allParents.filter(x=>!parentIds.includes(x.id)).map(x=>({
      id:x.id,
      name:x.name,
      rect:x.rect
    })));
    opts = opts.slice(0,3);
    // Add one correct parent
    const correctParent = state.members.find(x=>x.id===parentIds[0]);
    opts.push({id:correctParent.id, name:correctParent.name, rect:correctParent.rect});
    opts = shuffle(opts);
    quizContent.innerHTML = `
      <div class="quiz-question">¿Quién es el padre o madre de <b>${escapeHtml(child.name)}</b>?</div>
      <div class="quiz-options">${
        shuffle(opts).map(o=>{
          if (Math.random()<0.5) {
            return `<button class="quiz-opt-btn" onclick="answerQuiz('${escapeHtml(o.name.replace(/'/g,"\\'"))}', ${o.id}, this)">${escapeHtml(o.name)}</button>`;
          } else {
            let photo = cropImgToDataUrl(state.image, ...o.rect);
            return `<button class="quiz-opt-btn" onclick="answerQuiz('${escapeHtml(o.name.replace(/'/g,"\\'"))}', ${o.id}, this)"><img src="${photo}"></button>`;
          }
        }).join('')
      }</div>
    `;
  }
}
window.answerQuiz = function(ans, ansId, btnEl) {
  if (quiz._answering) return; // prevent double-tap
  quiz._answering = true;
  const q = quiz.questions[quiz.i];
  let correct = false, desc = '';
  if (q.type==='who-photo') {
    const m = state.members.find(x=>x.id===q.member);
    correct = ans===m.name;
    desc = `¿Quién aparece en la foto? Correcto: ${m.name}, Tú: ${ans}`;
  } else if (q.type==='how-many-children') {
    const m = state.members.find(x=>x.id===q.member);
    correct = Number(ans)===m.children.length;
    desc = `¿Cuántos hijos tiene ${m.name}? Correcto: ${m.children.length}, Tú: ${ans}`;
  } else if (q.type==='who-spouse') {
    const m = state.members.find(x=>x.id===q.member);
    const spouse = state.members.find(x=>x.id===m.spouse);
    correct = ans=== (spouse ? spouse.name : "");
    desc = `¿Quién es la pareja de ${m.name}? Correcto: ${spouse ? spouse.name : "(Ninguno)"}, Tú: ${ans}`;
  } else if (q.type==='who-parent') {
    const child = state.members.find(x=>x.id===q.child);
    const parentIds = state.members.filter(x=>x.children && x.children.includes(child.id)).map(x=>x.id);
    const parentNames = parentIds.map(pid=>state.members.find(x=>x.id===pid).name);
    correct = parentNames.includes(ans);
    desc = `¿Quién es el padre o madre de ${child.name}? Correcto: ${parentNames.join(' o ')}, Tú: ${ans}`;
  }
  quiz.answers.push({correct, desc, time: Date.now() - quiz.qStart});
  if (correct) quiz.score++;
  // Visual feedback: highlight tapped button
  if (btnEl) {
    btnEl.style.background = correct ? '#c8e6c9' : '#ffcdd2';
    btnEl.style.borderColor = correct ? '#2e7d32' : '#c62828';
    btnEl.style.color = correct ? '#1b5e20' : '#b71c1c';
    btnEl.style.fontWeight = '700';
  }
  // Disable all buttons
  document.querySelectorAll('.quiz-opt-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.7'; });
  setTimeout(() => {
    quiz._answering = false;
    quiz.i++;
    renderQuizQ();
  }, 500);
};

// Lightweight confetti effect
function launchConfetti(intensity) {
  // intensity: 0-1, exponentially scaled by caller
  const count = Math.round(intensity * 120);
  if (count <= 0) return;
  const colors = ['#1976d2','#2e7d32','#e91e63','#ff9800','#9c27b0','#00bcd4','#ffeb3b'];
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;overflow:hidden;';
  document.body.appendChild(container);
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('div');
    const size = 6 + Math.random()*6;
    const x = Math.random()*100;
    const drift = (Math.random()-0.5)*40;
    const dur = 1.5 + Math.random()*2;
    const delay = Math.random()*0.8;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const shape = Math.random()>0.5 ? '50%' : '2px';
    dot.style.cssText = `position:absolute;top:-10px;left:${x}%;width:${size}px;height:${size}px;background:${color};border-radius:${shape};opacity:1;`;
    dot.animate([
      {transform:`translateY(0) translateX(0) rotate(0deg)`, opacity:1},
      {transform:`translateY(${window.innerHeight+20}px) translateX(${drift}vw) rotate(${360+Math.random()*720}deg)`, opacity:0.2}
    ], {duration:dur*1000, delay:delay*1000, easing:'cubic-bezier(.25,.46,.45,.94)', fill:'forwards'});
    container.appendChild(dot);
  }
  setTimeout(()=>container.remove(), 5000);
}

function drawFamilyGraphV2() {
  const ctx = graphCanvas.getContext('2d');
  const members = state.members.slice();
  if (!state.image || members.length === 0) {
    graphCanvas.width = 900; graphCanvas.height = 400;
    ctx.clearRect(0,0,900,400);
    ctx.font = '20px sans-serif'; ctx.fillStyle = '#999';
    ctx.fillText('No hay datos familiares para mostrar.', 80, 180);
    return;
  }

  // --- Assign generations ---
  // A "true root" is someone who is NOT a child of anyone AND is not just a spouse
  // who married into a lower generation.
  const childIds = new Set();
  members.forEach(m => (m.children||[]).forEach(cid => childIds.add(cid)));
  
  // True roots: not a child, and either has no spouse or spouse is also not a child
  const trueRoots = members.filter(m => {
    if (childIds.has(m.id)) return false;
    // If this person's spouse IS a child of someone, then this person is a married-in
    // at a lower generation — don't seed them as root
    if (m.spouse && childIds.has(m.spouse)) return false;
    return true;
  });
  // If no true roots found (circular?), fallback to all non-children
  const roots = trueRoots.length > 0 ? trueRoots : members.filter(m => !childIds.has(m.id));

  const genMap = {};
  const queue = [];
  roots.forEach(r => { genMap[r.id] = 0; queue.push(r.id); });
  while (queue.length) {
    const id = queue.shift();
    const m = members.find(x=>x.id===id);
    if (!m) continue;
    // Assign spouse same generation
    if (m.spouse && genMap[m.spouse] === undefined) {
      genMap[m.spouse] = genMap[id]; queue.push(m.spouse);
    }
    // Assign children next generation
    (m.children||[]).forEach(cid => {
      if (genMap[cid] === undefined) { genMap[cid] = genMap[id]+1; queue.push(cid); }
    });
  }
  // Fallback: any unvisited members
  members.forEach(m => { if (genMap[m.id] === undefined) genMap[m.id] = 0; });

  // Group by generation
  const genGroups = {};
  members.forEach(m => { const g=genMap[m.id]; if(!genGroups[g]) genGroups[g]=[]; genGroups[g].push(m); });
  const genKeys = Object.keys(genGroups).map(Number).sort((a,b)=>a-b);

  // --- Layout: tree-based with subtree width reservation ---
  const imgSize = 52;
  const COUPLE_GAP = 14;
  const SIBLING_GAP = 32;
  const FAMILY_GAP = 50;
  const ROW_H = 120;
  const MARGIN = 30;

  // Build a tree structure: identify "family units" (couple or single parent) and their children
  // Each family unit in a generation owns a subtree whose width is the max of:
  //   - the unit itself (1 or 2 people)
  //   - the total width of its children's subtrees in the next generation
  // This ensures parents always center above their descendants.

  const memberById = {};
  members.forEach(m => memberById[m.id] = m);

  // Identify family units per generation: a unit is a couple (lower id is key) or a single person
  // A person belongs to their spouse's unit if spouse has lower id
  const unitOf = {}; // memberId -> unitId
  const units = {}; // unitId -> { ids: [...], children: [childIds], gen }
  members.forEach(m => {
    if (unitOf[m.id] !== undefined) return;
    const g = genMap[m.id];
    let unitId;
    if (m.spouse && memberById[m.spouse] && genMap[m.spouse] === g) {
      unitId = Math.min(m.id, m.spouse);
      unitOf[m.id] = unitId;
      unitOf[m.spouse] = unitId;
      const primary = memberById[unitId];
      const secondary = memberById[m.id === unitId ? m.spouse : m.id];
      if (!units[unitId]) {
        const kids = new Set();
        (primary.children||[]).forEach(c => kids.add(c));
        (secondary.children||[]).forEach(c => kids.add(c));
        units[unitId] = { ids: [unitId, unitId === m.id ? m.spouse : m.id], children: [...kids], gen: g };
      }
    } else {
      unitId = m.id;
      unitOf[m.id] = unitId;
      if (!units[unitId]) {
        units[unitId] = { ids: [m.id], children: (m.children||[]).slice(), gen: g };
      }
    }
  });

  // Order units within each generation: units in gen>0 are ordered by their parent unit's order
  const genUnits = {}; // gen -> [unitId, ...] in order
  genKeys.forEach(g => genUnits[g] = []);
  // Collect units per gen
  Object.keys(units).forEach(uid => {
    const u = units[uid];
    genUnits[u.gen].push(Number(uid));
  });
  // Order gen 0 as-is (stable)
  // For subsequent gens, order by parent unit position then by child order within parent
  for (let gi = 1; gi < genKeys.length; gi++) {
    const g = genKeys[gi];
    const parentGen = genKeys[gi-1];
    const parentOrder = genUnits[parentGen];
    const ordered = [];
    const placed = new Set();
    parentOrder.forEach(puid => {
      const pu = units[puid];
      (pu.children||[]).forEach(cid => {
        const cuid = unitOf[cid];
        if (cuid !== undefined && !placed.has(cuid) && units[cuid] && units[cuid].gen === g) {
          placed.add(cuid);
          ordered.push(cuid);
        }
      });
    });
    // Any remaining units in this gen (orphans)
    genUnits[g].forEach(uid => { if (!placed.has(uid)) ordered.push(uid); });
    genUnits[g] = ordered;
  }

  // Compute subtree width for each unit (bottom-up)
  const unitWidth = {}; // unitId -> pixel width
  for (let gi = genKeys.length - 1; gi >= 0; gi--) {
    const g = genKeys[gi];
    genUnits[g].forEach(uid => {
      const u = units[uid];
      const selfWidth = u.ids.length === 2 ? (imgSize * 2 + COUPLE_GAP) : imgSize;
      // Width of children subtrees
      const childUnits = [];
      const seenChildUnits = new Set();
      (u.children||[]).forEach(cid => {
        const cuid = unitOf[cid];
        if (cuid !== undefined && !seenChildUnits.has(cuid)) {
          seenChildUnits.add(cuid);
          childUnits.push(cuid);
        }
      });
      if (childUnits.length === 0) {
        unitWidth[uid] = selfWidth;
      } else {
        let childrenTotalWidth = 0;
        childUnits.forEach((cuid, i) => {
          childrenTotalWidth += (unitWidth[cuid] || imgSize);
          if (i < childUnits.length - 1) childrenTotalWidth += SIBLING_GAP;
        });
        unitWidth[uid] = Math.max(selfWidth, childrenTotalWidth);
      }
    });
  }

  // Position units top-down: each unit gets a horizontal span, centers itself within it
  const nodePos = {};
  const unitCenter = {}; // unitId -> center X

  // Top generation: lay out sequentially
  let topX = MARGIN;
  genUnits[genKeys[0]].forEach((uid, i) => {
    const w = unitWidth[uid] || imgSize;
    const cx = topX + w / 2;
    unitCenter[uid] = cx;
    const u = units[uid];
    if (u.ids.length === 2) {
      nodePos[u.ids[0]] = { x: cx - imgSize - COUPLE_GAP/2, y: MARGIN };
      nodePos[u.ids[1]] = { x: cx + COUPLE_GAP/2, y: MARGIN };
    } else {
      nodePos[u.ids[0]] = { x: cx - imgSize/2, y: MARGIN };
    }
    topX += w + FAMILY_GAP;
  });

  // Subsequent generations: position children within parent's allocated span
  for (let gi = 0; gi < genKeys.length - 1; gi++) {
    const g = genKeys[gi];
    const nextG = genKeys[gi+1];
    const y = MARGIN + (gi+1) * ROW_H;

    genUnits[g].forEach(puid => {
      const pu = units[puid];
      const parentCx = unitCenter[puid];
      const parentW = unitWidth[puid] || imgSize;
      const leftEdge = parentCx - parentW / 2;

      // Collect child units in order
      const childUnitsList = [];
      const seen = new Set();
      (pu.children||[]).forEach(cid => {
        const cuid = unitOf[cid];
        if (cuid !== undefined && !seen.has(cuid) && units[cuid] && units[cuid].gen === nextG) {
          seen.add(cuid);
          childUnitsList.push(cuid);
        }
      });
      if (childUnitsList.length === 0) return;

      // Total children width
      let totalCW = 0;
      childUnitsList.forEach((cuid, i) => {
        totalCW += (unitWidth[cuid] || imgSize);
        if (i < childUnitsList.length - 1) totalCW += SIBLING_GAP;
      });

      // Center children block within parent's span
      let cx = leftEdge + (parentW - totalCW) / 2;

      childUnitsList.forEach(cuid => {
        const cw = unitWidth[cuid] || imgSize;
        const center = cx + cw / 2;
        unitCenter[cuid] = center;
        const cu = units[cuid];
        if (cu.ids.length === 2) {
          nodePos[cu.ids[0]] = { x: center - imgSize - COUPLE_GAP/2, y };
          nodePos[cu.ids[1]] = { x: center + COUPLE_GAP/2, y };
        } else {
          nodePos[cu.ids[0]] = { x: center - imgSize/2, y };
        }
        cx += cw + SIBLING_GAP;
      });
    });

    // Handle orphan units in this generation (no parent positioned them)
    genUnits[nextG].forEach(uid => {
      if (unitCenter[uid] !== undefined) return;
      // Find rightmost positioned node
      let maxX = MARGIN;
      Object.values(nodePos).forEach(p => { if (p.x + imgSize > maxX) maxX = p.x + imgSize; });
      const w = unitWidth[uid] || imgSize;
      const cx = maxX + FAMILY_GAP + w/2;
      unitCenter[uid] = cx;
      const u = units[uid];
      if (u.ids.length === 2) {
        nodePos[u.ids[0]] = { x: cx - imgSize - COUPLE_GAP/2, y };
        nodePos[u.ids[1]] = { x: cx + COUPLE_GAP/2, y };
      } else {
        nodePos[u.ids[0]] = { x: cx - imgSize/2, y };
      }
    });
  }

  // Handle single generation case
  if (genKeys.length === 1) {
    let x = MARGIN;
    genUnits[genKeys[0]].forEach(uid => {
      const u = units[uid];
      if (u.ids.length === 2) {
        nodePos[u.ids[0]] = { x, y: MARGIN };
        nodePos[u.ids[1]] = { x: x + imgSize + COUPLE_GAP, y: MARGIN };
        x += imgSize * 2 + COUPLE_GAP + SIBLING_GAP;
      } else {
        nodePos[u.ids[0]] = { x, y: MARGIN };
        x += imgSize + SIBLING_GAP;
      }
    });
  }

  // Normalize: shift so leftmost is at MARGIN
  let minX = Infinity;
  members.forEach(m => { if (nodePos[m.id]) minX = Math.min(minX, nodePos[m.id].x); });
  const shiftX = MARGIN - minX;
  members.forEach(m => { if (nodePos[m.id]) nodePos[m.id].x += shiftX; });

  // Compute canvas size
  let maxX = 0;
  members.forEach(m => { if (nodePos[m.id]) maxX = Math.max(maxX, nodePos[m.id].x + imgSize); });
  const canvasW = Math.max(maxX + MARGIN, 400);
  const canvasH = Math.max(genKeys.length * ROW_H + 80, 300);
  graphCanvas.width = canvasW;
  graphCanvas.height = canvasH;

  ctx.clearRect(0, 0, canvasW, canvasH);

  // --- Draw couple lines ---
  members.forEach(m => {
    if (m.spouse && m.id < m.spouse && nodePos[m.id] && nodePos[m.spouse]) {
      const p1 = nodePos[m.id], p2 = nodePos[m.spouse];
      const ly = p1.y + imgSize/2;
      ctx.save();
      ctx.strokeStyle = '#e91e63'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p1.x + imgSize, ly);
      ctx.lineTo(p2.x, ly);
      ctx.stroke();
      // Heart
      const mx = (p1.x + imgSize + p2.x) / 2;
      ctx.fillStyle = '#e91e63'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('\u2764', mx, ly + 4);
      ctx.restore();
    }
  });

  // --- Draw parent-child lines ---
  members.forEach(m => {
    if (!m.children || !m.children.length) return;
    if (m.spouse && m.id > m.spouse) return;

    const p1 = nodePos[m.id];
    const p2 = m.spouse ? nodePos[m.spouse] : null;
    if (!p1) return;

    // Start point: center between couple, or center of single parent
    const fromX = p2 ? (p1.x + p2.x + imgSize) / 2 : p1.x + imgSize/2;
    const fromY = p1.y + imgSize + 2;

    const childPositions = m.children.map(cid => nodePos[cid]).filter(Boolean);
    if (!childPositions.length) return;

    const trunkY = fromY + (ROW_H - imgSize) * 0.35;

    ctx.save();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;

    // Vertical trunk from parents
    ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(fromX, trunkY); ctx.stroke();

    // Horizontal bar spanning all children
    const childXs = childPositions.map(cp => cp.x + imgSize/2);
    const barLeft = Math.min(...childXs);
    const barRight = Math.max(...childXs);
    if (barLeft !== barRight || childXs[0] !== fromX) {
      ctx.beginPath(); ctx.moveTo(Math.min(barLeft, fromX), trunkY); ctx.lineTo(Math.max(barRight, fromX), trunkY); ctx.stroke();
    }

    // Vertical drops to each child
    childPositions.forEach(cp => {
      const toX = cp.x + imgSize/2;
      const toY = cp.y - 2;
      ctx.beginPath(); ctx.moveTo(toX, trunkY); ctx.lineTo(toX, toY); ctx.stroke();
      // Arrow
      ctx.beginPath();
      ctx.moveTo(toX-3, toY-5); ctx.lineTo(toX, toY); ctx.lineTo(toX+3, toY-5);
      ctx.stroke();
    });
    ctx.restore();
  });

  // --- Draw nodes ---
  members.forEach(m => {
    const pos = nodePos[m.id];
    if (!pos) return;
    const x = pos.x, y = pos.y;
    // White bg
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x+imgSize/2, y+imgSize/2, imgSize/2+3, 0, 2*Math.PI); ctx.fill();
    // Photo
    const photo = cropMemberPhoto(m);
    if (photo) {
      ctx.save();
      ctx.beginPath(); ctx.arc(x+imgSize/2, y+imgSize/2, imgSize/2, 0, 2*Math.PI); ctx.closePath(); ctx.clip();
      ctx.drawImage(photo, x, y, imgSize, imgSize);
      ctx.restore();
    } else {
      ctx.fillStyle = '#ddd';
      ctx.beginPath(); ctx.arc(x+imgSize/2, y+imgSize/2, imgSize/2, 0, 2*Math.PI); ctx.fill();
    }
    // Border
    ctx.strokeStyle = '#1976d2'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x+imgSize/2, y+imgSize/2, imgSize/2, 0, 2*Math.PI); ctx.stroke();
    // Name
    ctx.font = '11px sans-serif'; ctx.fillStyle = '#222'; ctx.textAlign = 'center';
    ctx.fillText(m.name||'', x+imgSize/2, y+imgSize+13);
  });
}

// Auto-load session file on page load
window.addEventListener('load', async () => {
  const url = 'quiz-familiar-session.ses';
  try {
    const resp = await fetch(url, { cache: 'no-cache' });
    if (!resp.ok) {
      // no file found (404) or other non-ok — nothing to do
      return;
    }
    const text = (await resp.text()).trim();
    if (!text) return;

    // Try parse as new encrypted envelope
    let parsed = null;
    try { parsed = JSON.parse(text); } catch (e) { parsed = null; }

    if (parsed && parsed.ct && parsed.salt && parsed.iv) {
      // Found encrypted session file. Prompt for password and try to decrypt.
      const password = prompt('Se ha detectado quiz-familiar-session.ses. Introduce la contraseña para descifrarla:');
      if (!password) return;
      try {
        const compressed = await decryptCompressedBytes(password, parsed);
        // decompress
        const decompressed = (typeof pako !== 'undefined') ? pako.inflate(compressed) : compressed;
        const json = new TextDecoder().decode(decompressed);
        const data = JSON.parse(json);
        Object.assign(state, {
          image: data.image || null,
          imgWidth: data.imgWidth || 0,
          imgHeight: data.imgHeight || 0,
          members: Array.isArray(data.members) ? data.members : []
        });
        if (state.image) loadImage(state.image); else drawCanvas();
        renderMemberList();
        showEditPane(null);
        sessionLoadError.textContent = '';
        console.info('Session loaded from quiz-familiar-session.ses');
      } catch (err) {
        console.error('Failed to decrypt/load quiz-familiar-session.ses:', err);
        sessionLoadError.textContent = 'No se pudo descifrar quiz-familiar-session.ses (contraseña inválida o archivo corrupto).';
      }
    } else {
      // Not the new envelope. Try to decode as legacy session (raw JSON or legacy base64)
      try {
        const legacy = tryDecodeOldFormat(text);
        const proceed = confirm('Se ha detectado un archivo de sesión en quiz-familiar-session.ses en formato antiguo. ¿Deseas cargarlo ahora? (Aceptar = cargar, Cancelar = ignorar)');
        if (!proceed) return;
        Object.assign(state, {
          image: legacy.image || null,
          imgWidth: legacy.imgWidth || 0,
          imgHeight: legacy.imgHeight || 0,
          members: Array.isArray(legacy.members) ? legacy.members : []
        });
        if (state.image) loadImage(state.image); else drawCanvas();
        renderMemberList();
        showEditPane(null);
        sessionLoadError.textContent = '';
        // Optionally prompt to convert+encrypt can be done elsewhere; we keep this minimal.
        console.info('Legacy session loaded from quiz-familiar-session.ses');
      } catch (err) {
        // Unknown format — ignore silently (or log)
        console.warn('Found quiz-familiar-session.ses but could not parse as known format.', err);
      }
    }
  } catch (err) {
    // fetch failed or other error (CORS, network...). Ignore silently or log.
    console.debug('No accessible quiz-familiar-session.ses or load error:', err);
  }
});
</script>
